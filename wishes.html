<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 50th Birthday Ashish!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --black-soft: #141414;
    --gold: #c9a84c;
    --gold-light: #e8d48b;
    --gold-glow: rgba(201, 168, 76, 0.4);
    --gold-dim: rgba(201, 168, 76, 0.15);
    --white: #ffffff;
    --white-soft: rgba(255, 255, 255, 0.85);
    --white-muted: rgba(255, 255, 255, 0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Gold bokeh canvas */
  #bokeh {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ========== HEADER ========== */
  .header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 3.5rem 1.5rem 1.5rem;
  }

  .header h1 {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 400;
    color: var(--white);
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(201, 168, 76, 0.3);
    margin-bottom: 0.2rem;
  }

  .header .age {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4.5rem, 16vw, 9rem);
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    display: block;
    text-shadow:
      0 0 30px var(--gold-glow),
      0 0 60px rgba(201, 168, 76, 0.2);
    letter-spacing: 0.05em;
  }

  .header .name {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    color: var(--white);
    display: block;
    margin-top: -0.2rem;
    text-shadow: 0 2px 15px rgba(201, 168, 76, 0.2);
  }

  .header .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.95rem, 2.5vw, 1.2rem);
    color: var(--white-muted);
    margin-top: 1rem;
    font-style: italic;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Gold divider */
  .divider {
    position: relative;
    z-index: 2;
    width: 120px;
    margin: 1.2rem auto 2rem;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider::before {
    content: '\2726';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--gold);
    font-size: 0.8rem;
    background: var(--black);
    padding: 0 8px;
  }

  /* ========== CARD GRID ========== */
  .grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.4rem;
    padding: 0 1rem 3rem;
    max-width: 880px;
    margin: 0 auto;
  }

  @media (min-width: 600px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 1.6rem; padding: 0 1.5rem 3rem; }
  }
  @media (min-width: 900px) {
    .grid { grid-template-columns: repeat(4, 1fr); gap: 1.8rem; padding: 0 2rem 4rem; }
  }

  /* ========== CARD ========== */
  .card {
    background: var(--black-soft);
    border: 2px solid var(--gold);
    border-radius: 3px;
    padding: 0.45rem;
    padding-bottom: 2.2rem;
    cursor: pointer;
    transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    position: relative;
    will-change: transform;
    box-shadow:
      inset 0 0 0 1px rgba(201, 168, 76, 0.2),
      0 2px 12px rgba(0, 0, 0, 0.4),
      0 0 8px rgba(201, 168, 76, 0.1);
  }

  .card:nth-child(4n+1) { transform: rotate(-1.8deg); }
  .card:nth-child(4n+2) { transform: rotate(1.2deg); }
  .card:nth-child(4n+3) { transform: rotate(-0.8deg); }
  .card:nth-child(4n+4) { transform: rotate(2deg); }

  .card:hover {
    transform: rotate(0deg) scale(1.05) translateY(-5px) !important;
    border-color: var(--gold-light);
    box-shadow:
      inset 0 0 0 1px rgba(232, 212, 139, 0.3),
      0 8px 30px rgba(0, 0, 0, 0.5),
      0 0 20px rgba(201, 168, 76, 0.3);
    z-index: 10;
  }

  .card:active {
    transform: rotate(0deg) scale(0.97) !important;
  }

  /* Gold corner accents */
  .card::before,
  .card::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold-light);
    border-style: solid;
    opacity: 0.6;
    transition: opacity 0.3s;
  }
  .card::before {
    top: 4px; left: 4px;
    border-width: 2px 0 0 2px;
  }
  .card::after {
    bottom: 2.4rem; right: 4px;
    border-width: 0 2px 2px 0;
  }
  .card:hover::before,
  .card:hover::after { opacity: 1; }

  .card-thumb {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    border-radius: 1px;
    background: #1a1a1a;
  }

  .card-thumb-placeholder {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Great Vibes', cursive;
    font-size: 2.5rem;
    color: var(--gold);
    text-shadow: 0 0 15px var(--gold-glow);
    position: relative;
    border-radius: 1px;
    background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
  }

  .play-badge {
    position: absolute;
    bottom: calc(2.2rem + 10px);
    right: 10px;
    width: 28px;
    height: 28px;
    background: rgba(0,0,0,0.7);
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: var(--gold);
    z-index: 3;
    pointer-events: none;
  }

  .play-badge-inner {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    background: rgba(0,0,0,0.5);
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: var(--gold);
  }

  .card-name {
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--white-soft);
    text-align: center;
    margin-top: 0.5rem;
    line-height: 1.2;
  }

  /* Card fade-in */
  .card { opacity: 0; }
  .card.visible { animation: cardIn 0.6s ease forwards; }
  .card:nth-child(4n+1).visible { animation-name: cardIn1; }
  .card:nth-child(4n+2).visible { animation-name: cardIn2; }
  .card:nth-child(4n+3).visible { animation-name: cardIn3; }
  .card:nth-child(4n+4).visible { animation-name: cardIn4; }
  @keyframes cardIn { from { opacity:0; transform: translateY(30px); } to { opacity:1; } }
  @keyframes cardIn1 { from { opacity:0; transform: translateY(30px) rotate(0); } to { opacity:1; transform: rotate(-1.8deg); } }
  @keyframes cardIn2 { from { opacity:0; transform: translateY(30px) rotate(0); } to { opacity:1; transform: rotate(1.2deg); } }
  @keyframes cardIn3 { from { opacity:0; transform: translateY(30px) rotate(0); } to { opacity:1; transform: rotate(-0.8deg); } }
  @keyframes cardIn4 { from { opacity:0; transform: translateY(30px) rotate(0); } to { opacity:1; transform: rotate(2deg); } }

  /* ========== MODAL ========== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    padding: 1rem;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    position: relative;
    background: var(--black-soft);
    border: 1px solid rgba(201, 168, 76, 0.3);
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 1.5rem;
    border-radius: 4px;
    position: relative;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.8),
      0 0 30px var(--gold-dim);
    transform: scale(0.9) translateY(20px);
    transition: transform 0.3s ease;
  }
  .modal-overlay.active .modal {
    transform: scale(1) translateY(0);
  }

  /* Gold corner accents on modal */
  .modal::before,
  .modal::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  .modal::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
  .modal::after { top: 6px; right: 6px; border-width: 1px 1px 0 0; }

  .modal-close {
    position: absolute;
    top: 0.7rem;
    right: 0.7rem;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(201, 168, 76, 0.3);
    background: transparent;
    border-radius: 50%;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white-muted);
    z-index: 3;
    transition: all 0.2s;
    line-height: 1;
  }
  .modal-close:hover {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 10px var(--gold-dim);
  }

  .modal-name {
    font-family: 'Great Vibes', cursive;
    font-size: 2rem;
    font-weight: 400;
    color: var(--white);
    text-align: center;
    margin: 0.5rem 0 0.8rem;
    text-shadow: 0 0 15px var(--gold-glow);
  }
  .modal-name::after {
    content: '';
    display: block;
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0.4rem auto 0;
  }

  .modal-subtitle {
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    color: var(--gold-light);
    text-align: center;
    font-style: italic;
    margin: 0.2rem 0 1rem;
    letter-spacing: 0.02em;
  }

  .modal-media { margin-bottom: 1rem; }

  .modal-media video,
  .modal-media img {
    width: 100%;
    display: block;
    border-radius: 2px;
    border: 1px solid rgba(201, 168, 76, 0.2);
  }
  .modal-media video { background: #000; margin-bottom: 0.5rem; }

  .modal-photos { display: grid; gap: 0.5rem; }
  .modal-photos.count-1 { grid-template-columns: 1fr; }
  .modal-photos.count-2 { grid-template-columns: 1fr 1fr; }
  .modal-photos.count-3 { grid-template-columns: 1fr 1fr; }
  .modal-photos.count-3 img:first-child { grid-column: 1 / -1; }
  .modal-photos.count-many { grid-template-columns: 1fr 1fr; }
  .modal-photos img { width: 100%; height: auto; object-fit: cover; transition: transform 0.2s; cursor: pointer; }
  .modal-photos img:hover { transform: scale(1.02); }

  .modal-message {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    line-height: 1.55;
    color: var(--white-soft);
    padding: 1rem 1.2rem;
    background: rgba(201, 168, 76, 0.06);
    border-left: 2px solid var(--gold);
    border-radius: 0 4px 4px 0;
    margin-top: 0.8rem;
    white-space: pre-wrap;
  }

  /* ========== FOOTER ========== */
  .footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 1rem 1rem 2.5rem;
  }
  .footer p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    color: var(--white-muted);
    font-style: italic;
    letter-spacing: 0.1em;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: rgba(201, 168, 76, 0.3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  /* Floating hearts */
  .heart-float {
    position: absolute;
    pointer-events: none;
    z-index: 10;
    font-size: 1rem;
    will-change: transform, opacity;
  }
</style>

<script>
  // ============================================================
  // GOLD BOKEH PARTICLE ANIMATION
  // ============================================================
  (function() {
    var canvas = document.getElementById('bokeh');
    var ctx = canvas.getContext('2d');
    var orbs = [];
    var count = 140;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = document.documentElement.scrollHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Re-size canvas when content changes height
    var resizeObserver = new MutationObserver(resize);
    resizeObserver.observe(document.body, { childList: true, subtree: true });

    function Orb() {
      this.reset();
    }

    Orb.prototype.reset = function() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 55 + 6;
      this.speedX = (Math.random() - 0.5) * 0.6;
      this.speedY = (Math.random() - 0.5) * 0.5 - 0.2;
      this.opacity = Math.random() * 0.45 + 0.12;
      this.targetOpacity = this.opacity;
      this.pulse = Math.random() * Math.PI * 2;
      this.pulseSpeed = Math.random() * 0.02 + 0.008;
      // Bright gold color variations
      var golds = [
        [255, 215, 0],
        [255, 200, 50],
        [218, 190, 100],
        [240, 220, 130],
        [255, 235, 150],
        [201, 168, 76],
        [232, 212, 140],
        [255, 223, 100]
      ];
      this.color = golds[Math.floor(Math.random() * golds.length)];
    };

    Orb.prototype.update = function() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.pulse += this.pulseSpeed;
      this.opacity = this.targetOpacity + Math.sin(this.pulse) * 0.18;

      // Wrap around
      if (this.x < -50) this.x = canvas.width + 50;
      if (this.x > canvas.width + 50) this.x = -50;
      if (this.y < -50) this.y = canvas.height + 50;
      if (this.y > canvas.height + 50) this.y = -50;
    };

    Orb.prototype.draw = function() {
      var alpha = Math.max(0, Math.min(1, this.opacity));
      var r = this.color[0], g = this.color[1], b = this.color[2];

      // Outer glow
      var grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
      grad.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + Math.min(1, alpha * 1.2) + ')');
      grad.addColorStop(0.25, 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.6) + ')');
      grad.addColorStop(0.5, 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.2) + ')');
      grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');

      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Bright center
      var centerGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 0.25);
      centerGrad.addColorStop(0, 'rgba(255, 255, 240,' + Math.min(1, alpha * 1.8) + ')');
      centerGrad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = centerGrad;
      ctx.fill();
    };

    for (var i = 0; i < count; i++) {
      orbs.push(new Orb());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < orbs.length; i++) {
        orbs[i].update();
        orbs[i].draw();
      }
      requestAnimationFrame(animate);
    }
    animate();
  })();

  // BACKGROUND MUSIC (MP3 for photo/text-only wishes)

  var ambientMusic = (function() {
    var tracks = ['media/bgmusic.mp3', 'media/bgmusic2.mp3'];
    var audio = new Audio();
    audio.loop = true;
    audio.volume = 0;
    var fadeInterval = null;
    var isPlaying = false;

    function start() {
      if (isPlaying) return;
      isPlaying = true;
      audio.src = tracks[Math.floor(Math.random() * tracks.length)];
      audio.currentTime = 0;
      audio.play().catch(function() {});
      var vol = 0;
      clearInterval(fadeInterval);
      fadeInterval = setInterval(function() {
        vol += 0.03;
        if (vol >= 0.5) { vol = 0.5; clearInterval(fadeInterval); }
        audio.volume = vol;
      }, 50);
    }

    function stop() {
      if (!isPlaying) return;
      isPlaying = false;
      var vol = audio.volume;
      clearInterval(fadeInterval);
      fadeInterval = setInterval(function() {
        vol -= 0.04;
        if (vol <= 0) {
          vol = 0;
          clearInterval(fadeInterval);
          audio.pause();
          audio.currentTime = 0;
        }
        audio.volume = Math.max(0, vol);
      }, 50);
    }

    return { start: start, stop: stop };
  })();

  // ============================================================
  // BUILD CARDS
  // ============================================================
  var grid = document.getElementById('wishGrid');

  wishes.forEach(function(wish, i) {
    var card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', 'View wish from ' + wish.name);

    var hasVideo = wish.videos.length > 0;
    var hasThumb = wish.thumb && wish.thumb.length > 0;

    if (hasThumb) {
      // Use the thumbnail face photo for the card
      var img = document.createElement('img');
      img.className = 'card-thumb';
      img.src = wish.thumb;
      img.alt = wish.name;
      img.loading = 'lazy';
      card.appendChild(img);
      if (hasVideo) {
        var badge = document.createElement('div');
        badge.className = 'play-badge';
        badge.textContent = '\u25B6';
        card.appendChild(badge);
      }
    } else {
      // Fallback: gold initials placeholder
      var placeholder = document.createElement('div');
      placeholder.className = 'card-thumb-placeholder';
      var initials = wish.name.split(/[\s&]+/).map(function(w) { return w[0]; }).join('').substring(0, 2);
      placeholder.textContent = initials;
      if (hasVideo) {
        var innerBadge = document.createElement('div');
        innerBadge.className = 'play-badge-inner';
        innerBadge.textContent = '\u25B6';
        placeholder.appendChild(innerBadge);
      }
      card.appendChild(placeholder);
    }

    var nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = wish.name;
    card.appendChild(nameEl);

    card.addEventListener('click', function() { openModal(wish); });
    card.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(wish); }
    });

    setTimeout(function() { card.classList.add('visible'); }, 150 + i * 90);
    grid.appendChild(card);
  });

  // ============================================================
  // MODAL
  // ============================================================
  var overlay = document.getElementById('modalOverlay');
  var modalName = document.getElementById('modalName');
  var modalMedia = document.getElementById('modalMedia');
  var modalMessage = document.getElementById('modalMessage');
  var modalClose = document.getElementById('modalClose');

  function buildPhotoGrid(photos, name) {
    var photoGrid = document.createElement('div');
    var countClass = photos.length > 3 ? 'many' : photos.length;
    photoGrid.className = 'modal-photos count-' + countClass;
    photos.forEach(function(src) {
      var img = document.createElement('img');
      img.src = src;
      img.alt = name;
      img.loading = 'lazy';
      photoGrid.appendChild(img);
    });
    return photoGrid;
  }

  function openModal(wish) {
    modalName.textContent = wish.name;
    while (modalMedia.firstChild) { modalMedia.removeChild(modalMedia.firstChild); }
    modalMessage.style.display = 'none';
    modalMessage.textContent = '';

    // Subtitle (e.g. song lyric)
    var oldSub = document.getElementById('modalSubtitle');
    if (oldSub) oldSub.parentNode.removeChild(oldSub);
    if (wish.subtitle) {
      var sub = document.createElement('div');
      sub.id = 'modalSubtitle';
      sub.className = 'modal-subtitle';
      sub.textContent = wish.subtitle;
      modalName.parentNode.insertBefore(sub, modalMedia);
    }

    wish.videos.forEach(function(src) {
      var video = document.createElement('video');
      video.src = src;
      video.controls = true;
      video.preload = 'metadata';
      video.playsInline = true;
      video.setAttribute('playsinline', '');
      modalMedia.appendChild(video);
    });

    if (wish.audios && wish.audios.length > 0) {
      wish.audios.forEach(function(src) {
        var audioWrap = document.createElement('div');
        audioWrap.style.cssText = 'background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:4px;padding:1rem;margin-bottom:0.5rem;text-align:center;';
        var label = document.createElement('div');
        label.style.cssText = 'font-family:Caveat,cursive;font-size:1.1rem;color:var(--gold-light);margin-bottom:0.6rem;';
        label.textContent = '\u266B Voice message';
        audioWrap.appendChild(label);
        var audio = document.createElement('audio');
        audio.src = src;
        audio.controls = true;
        audio.preload = 'metadata';
        audio.style.cssText = 'width:100%;max-width:320px;';
        audioWrap.appendChild(audio);
        modalMedia.appendChild(audioWrap);
      });
    }

    if (wish.photos.length > 0) {
      modalMedia.appendChild(buildPhotoGrid(wish.photos, wish.name));
    }

    if (wish.message) {
      modalMessage.style.display = 'block';
      modalMessage.textContent = wish.message;
    }

    // Photos after message (interspersed layout)
    if (wish.photosAfter && wish.photosAfter.length > 0) {
      var afterGrid = buildPhotoGrid(wish.photosAfter, wish.name);
      afterGrid.style.marginTop = '1rem';
      modalMessage.parentNode.insertBefore(afterGrid, modalMessage.nextSibling);
    }

    // Play ambient music for wishes without video/audio
    var hasOwnSound = wish.videos.length > 0 || (wish.audios && wish.audios.length > 0);
    if (!hasOwnSound) {
      ambientMusic.start();
    }

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    modalClose.focus();
    sprinkleHearts();
  }

  // Continuous smooth floating hearts
  var heartsInterval = null;
  var heartsRAF = null;
  var activeHearts = [];

  function spawnHeart() {
    var modal = document.getElementById('modal');
    var span = document.createElement('span');
    span.className = 'heart-float';
    span.textContent = '\u2764';
    span.style.color = '#e84057';
    var x = 8 + Math.random() * 84;
    var y = 85 + Math.random() * 10;
    var size = 0.7 + Math.random() * 0.8;
    span.style.left = x + '%';
    span.style.fontSize = size + 'rem';
    // Slight horizontal sway
    var swaySpeed = 0.3 + Math.random() * 0.5;
    var swayAmount = 8 + Math.random() * 15;
    var speed = 0.25 + Math.random() * 0.3;
    var heart = {
      el: span,
      y: y,
      x: x,
      startX: x,
      opacity: 0,
      phase: 0, // 0=fade in, 1=visible, 2=fade out
      swaySpeed: swaySpeed,
      swayAmount: swayAmount,
      swayOffset: Math.random() * Math.PI * 2,
      speed: speed,
      time: 0
    };
    modal.appendChild(span);
    activeHearts.push(heart);
  }

  function animateHearts(timestamp) {
    for (var i = activeHearts.length - 1; i >= 0; i--) {
      var h = activeHearts[i];
      h.time += 16;
      h.y -= h.speed;
      // Smooth sine sway
      var sway = Math.sin(h.time * 0.002 * h.swaySpeed + h.swayOffset) * h.swayAmount;
      h.el.style.top = h.y + '%';
      h.el.style.left = (h.startX + sway * 0.3) + '%';
      // Fade in over first 15%, full in middle, fade out last 25%
      var progress = (85 - h.y) / 80; // 0 at bottom, 1 at top
      if (progress < 0.15) {
        h.el.style.opacity = (progress / 0.15) * 0.5;
      } else if (progress > 0.75) {
        h.el.style.opacity = ((1 - progress) / 0.25) * 0.5;
      } else {
        h.el.style.opacity = 0.5;
      }
      // Remove when off top
      if (h.y < 0) {
        if (h.el.parentNode) h.el.parentNode.removeChild(h.el);
        activeHearts.splice(i, 1);
      }
    }
    heartsRAF = requestAnimationFrame(animateHearts);
  }

  function sprinkleHearts() {
    stopHearts();
    // Spawn a new heart every ~500ms
    spawnHeart();
    heartsInterval = setInterval(spawnHeart, 500);
    heartsRAF = requestAnimationFrame(animateHearts);
  }

  function stopHearts() {
    clearInterval(heartsInterval);
    heartsInterval = null;
    if (heartsRAF) { cancelAnimationFrame(heartsRAF); heartsRAF = null; }
    var modal = document.getElementById('modal');
    for (var i = 0; i < activeHearts.length; i++) {
      if (activeHearts[i].el.parentNode) activeHearts[i].el.parentNode.removeChild(activeHearts[i].el);
    }
    activeHearts = [];
  }

  function closeModal() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    var videos = modalMedia.querySelectorAll('video');
    for (var i = 0; i < videos.length; i++) {
      videos[i].pause();
      videos[i].currentTime = 0;
    }
    var audios = modalMedia.querySelectorAll('audio');
    for (var j = 0; j < audios.length; j++) {
      audios[j].pause();
      audios[j].currentTime = 0;
    }
    // Clean up subtitle and photosAfter
    var oldSub = document.getElementById('modalSubtitle');
    if (oldSub) oldSub.parentNode.removeChild(oldSub);
    var afterGrid = modalMessage.nextElementSibling;
    if (afterGrid && afterGrid.classList.contains('modal-photos')) {
      afterGrid.parentNode.removeChild(afterGrid);
    }
    stopHearts();
    ambientMusic.stop();
  }

  modalClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
</script>
